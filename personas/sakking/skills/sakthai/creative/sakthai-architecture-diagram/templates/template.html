<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{%title%}</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background-color: #0d111a;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Helvetica Neue', sans-serif;
    }

    .container {
      text-align: center;
    }

    .diagram {
      display: inline-block;
      padding: 20px;
      background-color: #1b1c24;
      border: 1px solid #2c3e50;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.5);
    }

    .diagram-title {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 20px;
      color: #4092c5;
    }

    svg {
      display: block;
      margin: 0 auto;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="diagram">
      <div class="diagram-title">{%title%}</div>
      {%diagram_svg%}
    </div>
  </div>
</body>
</html>
