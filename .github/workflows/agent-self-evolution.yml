name: agent-self-evolution

on:
  push:
    branches: [main]
    paths:
      - "personas/sakthai/agent-self-evolution/**"
      - ".github/workflows/agent-self-evolution.yml"
  pull_request:
    branches: [main]
    paths:
      - "personas/sakthai/agent-self-evolution/**"
      - ".github/workflows/agent-self-evolution.yml"
  workflow_dispatch:

permissions:
  contents: read

# Standalone package (not a uv workspace member — see CLAUDE.md), so it gets its
# own install + pytest run rather than joining ci.yml, which is scoped to the
# sakthai core only. Each persona carries a copy; personas/sakthai's is the
# canonical one CI tests.
jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: personas/sakthai/agent-self-evolution
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.11"

      - name: Install
        run: pip install -e ".[dev]"

      - name: Tests (pytest)
        run: pytest tests/ -q
