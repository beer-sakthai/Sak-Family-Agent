# This workflow executes several linters on changed files based on the
# languages used in your code base whenever you push code or open a pull
# request.
#
# You can adjust the behavior by modifying this file.
# For more information, see:
# https://github.com/github/super-linter
name: Lint Code Base

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  run-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Full git history is needed so super-linter can compute the list
          # of changed files.
          fetch-depth: 0

      - name: Lint Code Base
        uses: github/super-linter@v4
        env:
          VALIDATE_ALL_CODEBASE: false
          DEFAULT_BRANCH: "main"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Python linting is owned by the project's own pipelines, not
          # super-linter: `ci.yml` runs ruff (lint + format), strict mypy over
          # `sakthai/`, and bandit, and `pylint.yml` runs pylint. Super-linter's
          # black/isort/flake8/mypy/pylint apply their own defaults to the whole
          # tree (including the co-located persona/prototype trees CI does not
          # gate) and conflict with ruff's formatting, so disable them here to
          # keep a single source of truth. JSCPD (copy/paste detection) is also
          # off as it is not part of this repo's quality bar.
          VALIDATE_PYTHON_BLACK: false
          VALIDATE_PYTHON_ISORT: false
          VALIDATE_PYTHON_FLAKE8: false
          VALIDATE_PYTHON_MYPY: false
          VALIDATE_PYTHON_PYLINT: false
          VALIDATE_JSCPD: false
