# This workflow runs the asset-monitor skill on a schedule to verify that
# public-facing assets are available.
name: Asset Monitor

on:
  workflow_dispatch: # Allows manual triggering from the Actions tab
  schedule:
    # Runs automatically every hour
    - cron: '0 * * * *'

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: pipx install uv

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run asset monitor skill
        # This command runs the monitor. The script is designed to use the
        # `send_telegram_message` tool on failure, which requires the
        # TELEGRAM_BOT_TOKEN and TELEGRAM_CHAT_ID secrets to be set.
        run: uv run python personas/shared/skills/monitoring/asset-monitor/scripts/run_asset_monitor.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # The SAKTHAI_SHELL_ALLOW is needed for the script to call other scripts.
          SAKTHAI_SHELL_ALLOW: "1"