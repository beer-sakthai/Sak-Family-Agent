name: Auto Dependency Update

on:
  workflow_dispatch: # Allows manual triggering from the Actions tab
  schedule:
    # Runs at 08:00 UTC every Monday
    - cron: '0 8 * * 1'

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: '3.12'

      - name: Cache uv
        uses: actions/cache@v6
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('**/uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Configure Git
        run: |
          git config user.name "SakJules [bot]"
          git config user.email "actions@github.com"

      - name: Create new branch
        id: branch
        run: |
          BRANCH_NAME="chore/deps-$(date +%Y-%m-%d)"
          echo "name=$BRANCH_NAME" >> $GITHUB_OUTPUT
          git checkout -b $BRANCH_NAME

      - name: Upgrade dependencies
        id: upgrade
        run: |
          uv pip compile pyproject.toml -o uv.lock --upgrade
          # Check if the lockfile changed. If not, we can exit early.
          if git diff --quiet uv.lock; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No dependency changes detected."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Dependencies upgraded. Proceeding to validation."
          fi

      - name: Validate changes
        if: steps.upgrade.outputs.changed == 'true'
        run: |
          uv sync --extra dev
          uv run pytest tests/ -q -m "not integration"

      - name: Create Pull Request
        if: steps.upgrade.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          # A PAT is required to trigger the CI workflow.
          # The GITHUB_TOKEN will not trigger other workflows.
          token: ${{ secrets.GH_PAT_FOR_ACTIONS }}
          commit-message: "build: Automated dependency upgrade"
          title: "build: Automated Dependency Upgrade"
          body: |
            This PR was automatically generated by the SakJules agent. It contains the latest dependency versions that pass all local tests.
            
            Auto-merging is enabled for this PR.
          branch: ${{ steps.branch.outputs.name }}
          base: main

      - name: Report no changes
        if: steps.upgrade.outputs.changed == 'false'
        run: echo "No new dependency versions found. Workflow complete."