# Secret scanning gate. SECURITY.md promises a gitleaks run on every push and
# pull request; this workflow is that gate. It scans the full git history using
# the repo's .gitleaks.toml (which allowlists test fixtures, instructional
# persona docs, and already-scrubbed values inherited from merged-repo history).
name: Secret Scan

on:
  push:
    branches: [ "main" ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository (full history)
        uses: actions/checkout@v7
        with:
          # gitleaks scans commit history, not just the checked-out tree.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
