# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# This workflow integrates open source static analysis tools with GitHub code
# scanning, via microsoft/security-devops-action (MSDO) — the maintained
# successor to github/ossar-action. OSSAR itself cannot run on this repo: it
# is Windows-only and passes every *.py file to bandit as command-line
# arguments, and the ~17k Python files here (six persona snapshots) overflow
# the Windows 32KB command-line limit, so bandit fails before it starts.
#
# bandit is deliberately not run in this workflow: CI (ci.yml) already runs
# bandit scoped to the core package (personas/sakthai/sakthai), and CodeQL
# covers Python across the repo.
name: OSSAR

on:
  push:
    branches: [ "main" ]
  pull_request:
    # The branches below must be a subset of the branches above
    branches: [ "main" ]
  schedule:
    - cron: '15 6 * * 1'

permissions:
  contents: read

jobs:
  OSSAR-Scan:
    permissions:
      contents: read # for actions/checkout to fetch code
      security-events: write # for github/codeql-action/upload-sarif to upload SARIF results
      actions: read # only required for a private repository by github/codeql-action/upload-sarif to get the Action run status
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v7

      # Run open source static analysis tools
    - name: Run Microsoft Security DevOps
      # Pinned to a release tag (not @latest) so the workflow can't silently
      # pick up a compromised or breaking action version; Dependabot bumps it.
      uses: microsoft/security-devops-action@v1.12.0
      id: msdo
      with:
        tools: eslint

      # Upload results to the Security tab
    - name: Upload results
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: ${{ steps.msdo.outputs.sarifFile }}
