name: Pylint

on: [push]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
    - uses: actions/checkout@v7
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v7
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pylint
        pip install -e ".[dev]" || pip install -e "."
    - name: Analysing the code with pylint
      run: |
        # Monorepo: lint only the core sakthai-agent package (canonical copy at
        # personas/sakthai/sakthai) + its tests. Other co-located trees (infra/*,
        # the other personas' package copies) carry their own quality bars and
        # are not held to this repo's pylint thresholds.
        pylint --fail-under=7.0 $(git ls-files | grep -E '^(personas/sakthai/sakthai|tests|scripts)/.*\.py$')
        pylint personas/sakthai/sakthai --disable=R0801,R0401 --fail-under=9.0
