# Dependabot keeps dependencies and pinned action versions current.
# Three ecosystems live in this repo: Python (uv), the dashboard's npm
# packages, and the GitHub Actions used by the workflows.
version: 2
updates:
  # Python dependencies — pyproject.toml + uv.lock at the repo root.
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly" # Can be "daily", "weekly", or "monthly"
      # Check for updates on Mondays at 9am Bangkok time
      day: "monday"
      time: "09:00"
      timezone: "Asia/Bangkok"
    open-pull-requests-limit: 5
    groups:
      python-minor-patch:
        update-types: ["minor", "patch"]

  # Dashboard frontend — dashboard/package.json + package-lock.json.
  - package-ecosystem: "npm"
    directory: "/dashboard"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    # Ignore specific dependencies
    ignore:
      # Ignore all updates for the 'express' package
      - dependency-name: "express"
      # Ignore only major version updates for the 'react' package
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
    groups:
      # Group all eslint-related packages together
      eslint-packages:
        patterns:
          - "eslint"
          - "eslint-*"
      npm-minor-patch:
        update-types: ["minor", "patch"]

  # Pinned action versions in .github/workflows/.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    # Create pull requests against the 'develop' branch instead of the default branch
    target-branch: "develop"
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns: ["*"]
