# This workflow runs the devsecops skill on a schedule to proactively
# find, triage, and automatically patch vulnerabilities.
#
# NOTE: this file lives at the repository root, NOT under .github/workflows/,
# so GitHub Actions does not currently execute it. If it is meant to run, move
# it into .github/workflows/. It is left in place (dormant) here and only
# hardened; its trigger/location was not changed. See docs/security-hardening.md.
name: Continuous Security Scan

on:
  workflow_dispatch: # Allows manual triggering from the Actions tab
  schedule:
    # Runs nightly at 2 AM UTC
    - cron: '0 2 * * *'

permissions:
  contents: write # To create branches and commits for patches
  pull-requests: write # To create pull requests with fixes

jobs:
  devsecops-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('**/uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Configure Git User
        run: |
          git config --global user.name "SakKing Agent [bot]"
          git config --global user.email "sakking-agent[bot]@users.noreply.github.com"

      - name: Run DevSecOps Skill
        # This command invokes the agent and tells it to use the devsecops skill.
        # The skill will scan for issues and trigger the automated patching pipeline,
        # which may create a pull request with a proposed fix.
        run: uv run sakthai run "Use the devsecops skill to perform a full security audit of the codebase." --with-skills devsecops --provider anthropic
        env:
          # API keys are needed for the LLM to generate patches.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # A PAT is used instead of the default GITHUB_TOKEN to ensure that any
          # pull requests created by the agent will trigger the full CI suite.
          # This is a critical security and validation measure.
          GITHUB_TOKEN: ${{ secrets.GH_PAT_FOR_ACTIONS }}
          # Scope shell execution to only the security tools the skill needs,
          # rather than "1" (which would allow ANY binary). Colon-separated
          # program allow-list, honored by sakthai's run_command tool.
          SAKTHAI_SHELL_ALLOW: "ruff:bandit:mypy:pytest:uv:git:python:python3"